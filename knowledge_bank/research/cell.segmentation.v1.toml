description = """This workflow provides a practical framework for comparing a classic image analysis technique (Otsu thresholding with Watershed) against two state-of-the-art deep learning models (StarDist and Cellpose) for cell nuclei segmentation. By generating both quantitative results (CSV files) and a qualitative visual comparison (2x2 montage), users can effectively evaluate the performance of each method on their specific dataset. The classic method serves as a fast, accessible baseline, while StarDist and Cellpose offer more robust segmentation, particularly in handling clustered or touching cells, at the cost of requiring a configured external Python environment. This comparative approach is a best practice for validating and selecting an appropriate segmentation algorithm."""

