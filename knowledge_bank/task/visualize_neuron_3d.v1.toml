type = "task"
signature = "visualize_neuron_3d.v1"
name = "visualize_neuron_3d"
topic = [
  "3d visualization",
  "neuroscience",
  "video creation",
  "3d projection",
]
tags = ["visualize_neuron_3d"]

description = """Generates a rotating 3D video of a neuron from a z-stack. The process involves enhancing contrast, creating a 3D projection, and saving the animation as an AVI file."""

question = """I would like to generate a 3D visualization of this neuron and create a video to present to my colleagues."""

summary = """### Summary of ImageJ Task

**1. Task Overview**
The primary objective was to generate a 3D visualization from a 128-slice image stack of a neuron (`neuron.tif`) and create a rotating video animation suitable for a presentation.

**2. Key Actions Taken**
The workflow proceeded through a series of planned steps after an initial knowledge base search did not yield a relevant automated workflow:
*   **Image Perception**: The session began with `imagej_perception` to analyze the input file, identifying it as `neuron.tif`, a 16-bit, 128-slice grayscale stack (576x576 pixels) showing bright neuronal structures against a dark background.
*   **User-Approved Plan**: After determining no pre-existing workflow was suitable, a new plan was proposed to the user: 1) Enhance contrast, 2) Generate a 3D projection, and 3) Save as an AVI video. The user approved this manual approach.
*   **Contrast Enhancement**: A macro was executed using `run("Enhance Contrast", "saturated=0.1 process_all");` to improve the visibility of the neuron across all slices of the stack.
*   **3D Visualization**: The core visualization was created using the `run("3D Project...", ...)` command. It was configured to generate a "Brightest Point" projection rotating 360 degrees around the Y-axis in 5-degree increments.
*   **Video Creation**: The resulting animation stack was saved as a video file using the `run("AVI... ", ...)` command.
*   **Verification**: A final check was performed with `folder_summary` to confirm that the output video file, `neuron_3d_rotation.avi`, was successfully created in the specified directory.

**3. Critical Results**
The complete workflow successfully generated the requested video file:
*   **Output File**: `neuron_3d_rotation.avi`
*   **File Location**: `D:/vscode_project/ChatImageJ/temp/neuron_3d_rotation.avi`

**4. Error Handling**
*   **Initial Workflow Failure**: An early attempt to use `kb_retrieve` to find an automated workflow for neuron 3D visualization was unsuccessful, as it returned an irrelevant calcium imaging task.
*   **Resolution Strategy**: The system successfully adapted by falling back to a manual, step-by-step approach using fundamental ImageJ tools. It formulated a clear plan, sought user approval via `user_manipulate`, and then executed each step methodically. This demonstrates robust problem-solving when an automated solution is unavailable.

**5. Current State**
The task is fully **completed**. All steps outlined in the user-approved plan were executed successfully, and the final video output has been generated and verified.

**6. Technical Details**
*   **Input File**: `C:\\Users\\10331\\OneDrive\\chatImageJ\\pics\\neuron.tif`
*   **Image Properties**: 576x576x128 voxels, 16-bit grayscale.
*   **3D Project Settings**:
    *   Projection Method: `Brightest Point`
    *   Rotation Axis: `Y-Axis`
    *   Total Rotation: `360 degrees`
    *   Rotation Increment: `5 degrees`
*   **Video Output Settings**:
    *   Compression: `JPEG`
    *   Frame Rate: `7 fps`"""

[[steps]]
id = 1
  [steps.action]
  name = "run_macro"
  script = """
run("Duplicate...", "title=neuron.tif duplicate");

selectWindow("neuron.tif");

run("Enhance Contrast", "saturated=0.1 process_all");
"""

[[steps]]
id = 2
  [steps.action]
  name = "run_macro"
  script = """selectWindow("neuron.tif");

run("3D Project...", "projection=[Brightest Point] axis=Y-Axis slice=1 initial=0 total=360 rotation=5 lower=1 upper=255 opacity=0 surface=100 interior=50 interpolate");
"""

[[steps]]
id = 3
  [steps.action]
  name = "run_macro"
  script = """run("AVI... ", "compression=JPEG frame=7 save=D:/vscode_project/ChatImageJ/temp/neuron_3d_rotation.avi");
"""


data_type = """16-bit grayscale z-stack (576x576x128 voxels) showing bright neuron structures against a dark background."""
[requirements]
bit_depth = [8, 16]
min_size = [128, 128]
channels = "1 (grayscale stack)"

[defaults]
contrast_saturation = "0.1"
rotation_increment_degrees = "5"
avi_compression = "JPEG"
avi_framerate = "7"

tips = [
  """Enhancing contrast before 3D projection significantly improves the visibility of structures in the final rendering.""",
  """For a smooth 360-degree rotation, use a small rotation increment (e.g., 5 degrees) in the '3D Project' tool.""",
  """Always verify the output file exists in the specified directory after saving to confirm the operation was successful.""",
  """Full stack duplicate → run("Duplicate...", "title=MyStack_Copy.tif duplicate");"""
]

