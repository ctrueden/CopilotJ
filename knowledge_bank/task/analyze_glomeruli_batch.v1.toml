  name = "execute_python_script"
  script = """import os
import pandas as pd
import numpy as np
import matplotlib.pyplot as plt
import seaborn as sns
from skimage import io, morphology, measure, util
from skimage.filters import threshold_otsu, rank
from pathlib import Path
import warnings

warnings.filterwarnings("ignore", message=".*OME series failed to read.*")

# --- Configuration ---
input_dir = Path('/Users/jacklu/Desktop/copilotj_website/claim_2/Kidney/data/')
output_dir = Path('/Users/jacklu/vscode_project/ChatImageJ/temp/kidney_batch_analysis/')

# --- Main Batch Processing Logic ---
def process_stack(stack_path, output_folder):
    \"\"\"Analyzes each slice of a 3D image stack and aggregates the results.\"\"\"
    try:
        output_folder.mkdir(parents=True, exist_ok=True)
        stack = io.imread(stack_path)

        if stack.ndim != 3:
            raise ValueError(f"Expected a 3D stack, but got shape {stack.shape} for {stack_path.name}")

        all_slice_props = []
        all_outlines = np.zeros_like(stack, dtype=np.uint8)

        for i, image_slice in enumerate(stack):
            image = util.img_as_ubyte(image_slice)
            
            selem = morphology.disk(50)
            background = rank.median(image, selem)
            image_sub = image.astype(np.float32) - background.astype(np.float32)
            image_sub = np.clip(image_sub, 0, 255).astype(image.dtype)
            
            thresh = threshold_otsu(image_sub)
            binary_mask = image_sub > thresh
            
            labels = measure.label(binary_mask)
            props_list = measure.regionprops(labels)
            
            if not props_list:
                continue

            properties = pd.DataFrame([{'label': p.label, 'area': p.area, 'perimeter': p.perimeter} for p in props_list])
            properties['slice_index'] = i
            all_slice_props.append(properties)

            filtered_labels_mask = np.isin(labels, properties['label'])
            contours = measure.find_contours(filtered_labels_mask, 0.5)
            for contour in contours:
                row_indices = np.round(contour[:, 0]).astype(int)
                col_indices = np.round(contour[:, 1]).astype(int)
                row_indices = np.clip(row_indices, 0, all_outlines.shape[1] - 1)
                col_indices = np.clip(col_indices, 0, all_outlines.shape[2] - 1)
                all_outlines[i, row_indices, col_indices] = 255

        if not all_slice_props:
            print(f"No objects found in any slice of {stack_path.name}. Skipping.")
            return

        combined_props = pd.concat(all_slice_props, ignore_index=True)
        print(f"Processing {stack_path.name}: Found {len(combined_props)} total objects before filtering.")

        combined_props.loc[combined_props['perimeter'] == 0, 'perimeter'] = 1
        combined_props['circularity'] = 4 * np.pi * combined_props['area'] / (combined_props['perimeter']**2)
        
        filtered_props = combined_props[(combined_props['area'] >= 1) & (combined_props['area'] <= 10000) & 
                                      (combined_props['circularity'] >= 0.1) & (combined_props['circularity'] <= 1.0)].copy()
        
        print(f"Processing {stack_path.name}: {len(filtered_props)} objects remained after filtering.")

        if filtered_props.empty:
            print(f"No objects matching relaxed criteria in {stack_path.name}. Skipping file generation.")
            return

        filtered_props.to_csv(output_folder / 'glomeruli_measurements.csv', index=False)
        
        max_proj_outlines = np.max(all_outlines, axis=0)
        io.imsave(output_folder / 'glomeruli_outlines.tif', max_proj_outlines, check_contrast=False)

        stats_summary = filtered_props.describe()
        stats_summary.to_csv(output_folder / 'glomeruli_statistics.csv')

        fig, axes = plt.subplots(2, 2, figsize=(14, 12))
        fig.suptitle(f'Aggregated Analysis for {stack_path.name}', fontsize=16)
        sns.histplot(filtered_props['area'], kde=True, ax=axes[0, 0], bins=30).set_title('Distribution of Area')
        sns.histplot(filtered_props['circularity'], kde=True, ax=axes[0, 1], bins=30).set_title('Distribution of Circularity')
        sns.scatterplot(data=filtered_props, x='area', y='circularity', ax=axes[1, 0], alpha=0.6).set_title('Area vs. Circularity')
        corr = filtered_props[['area', 'perimeter', 'circularity']].corr()
        sns.heatmap(corr, annot=True, cmap='coolwarm', ax=axes[1, 1], fmt='.2f').set_title('Correlation Matrix')
        plt.tight_layout(rect=[0, 0.03, 1, 0.95])
        plt.savefig(output_folder / 'glomeruli_analysis_plots.png', dpi=300)
        plt.close(fig)
        print(f"Successfully processed and saved results for {stack_path.name}")

    except Exception as e:
        import traceback
        print(f"Failed to process {stack_path.name}: {e}")
        traceback.print_exc()

# --- Main Execution Loop ---
if __name__ == '__main__':
    output_dir.mkdir(parents=True, exist_ok=True)
    image_files = sorted([f for f in input_dir.glob('*.tif')])
    print(f"Found {len(image_files)} image stacks to process.")
    for image_file in image_files:
        subfolder_name = f"{image_file.stem}_results"
        image_output_folder = output_dir / subfolder_name
        process_stack(image_file, image_output_folder)
    print(f"\nBatch processing complete. Results are in {output_dir}")"""

