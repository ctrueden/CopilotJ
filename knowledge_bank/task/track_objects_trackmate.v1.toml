[[steps]]
id = 2
  [steps.action]
  name = "execute_python_script"
  script = """import xml.etree.ElementTree as ET
import matplotlib.pyplot as plt
import os
import pandas as pd
import numpy as np

# Define file paths
xml_file = 'D:/vscode_project/ChatImageJ/temp/TrackMate_Export.xml'
output_dir_plots = 'D:/vscode_project/ChatImageJ/temp/track_plots/'
output_csv = 'D:/vscode_project/ChatImageJ/temp/motion_statistics.csv'

# Create the output directory if it doesn't exist
if not os.path.exists(output_dir_plots):
    os.makedirs(output_dir_plots)

# --- XML Parsing ---
try:
    tree = ET.parse(xml_file)
    root = tree.getroot()

    tracks = []
    # The root is <Tracks>, and it contains <particle> elements which are the tracks
    for track_element in root.findall('particle'):
        current_track_spots = []
        for detection_element in track_element.findall('detection'):
            try:
                t = float(detection_element.get('t'))
                x = float(detection_element.get('x'))
                y = float(detection_element.get('y'))
                current_track_spots.append({'t': t, 'x': x, 'y': y})
            except (ValueError, TypeError):
                continue
        if current_track_spots:
            # Sort spots within the track by frame number (t)
            current_track_spots.sort(key=lambda spot: spot['t'])
            tracks.append(current_track_spots)

    if not tracks:
        print("No tracks were found in the XML file. Please check the TrackMate detection parameters.")
    else:
        # --- Motion Statistics Calculation ---
        stats_list = []
        for i, spots in enumerate(tracks):
            if len(spots) < 2:
                continue
            
            track_id = i + 1
            frames = np.array([s['t'] for s in spots])
            x_coords = np.array([s['x'] for s in spots])
            y_coords = np.array([s['y'] for s in spots])

            # Calculate total distance
            distances = np.sqrt(np.diff(x_coords)**2 + np.diff(y_coords)**2)
            total_distance = np.sum(distances)

            # Calculate net displacement
            net_displacement = np.sqrt((x_coords[-1] - x_coords[0])**2 + (y_coords[-1] - y_coords[0])**2)

            # Calculate average speed (distance per frame)
            duration = frames[-1] - frames[0]
            average_speed = total_distance / duration if duration > 0 else 0
            
            stats_list.append({
                'Track_ID': track_id,
                'Start_Frame': int(frames[0]),
                'End_Frame': int(frames[-1]),
                'Lifetime_Frames': int(duration),
                'Total_Distance_pixels': total_distance,
                'Net_Displacement_pixels': net_displacement,
                'Average_Speed_pixels_per_frame': average_speed
            })

        stats_df = pd.DataFrame(stats_list)
        stats_df.to_csv(output_csv, index=False)
        print(f"Successfully calculated motion statistics for {len(stats_df)} tracks and saved to '{output_csv}'.")

        # --- Plot Generation ---
        num_plots_generated = 0
        for i, spots in enumerate(tracks):
            if len(spots) < 2:
                continue

            track_id = i + 1
            frames = [s['t'] for s in spots]
            x_coords = [s['x'] for s in spots]
            y_coords = [s['y'] for s in spots]

            fig, (ax1, ax2) = plt.subplots(2, 1, figsize=(10, 8), sharex=True)
            fig.suptitle(f'Track ID: {track_id}', fontsize=16)

            ax1.plot(frames, x_coords, 'r-o', label='X coordinate')
            ax1.set_ylabel('X Coordinate (pixels)')
            ax1.set_title('X Position vs. Time')
            ax1.grid(True)
            ax1.legend()

            ax2.plot(frames, y_coords, 'b-o', label='Y coordinate')
            ax2.set_xlabel('Frame (Time)')
            ax2.set_ylabel('Y Coordinate (pixels)')
            ax2.set_title('Y Position vs. Time')
            ax2.grid(True)
            ax2.legend()

            plt.tight_layout(rect=[0, 0.03, 1, 0.95])
            
            plot_filename = os.path.join(output_dir_plots, f'track_{track_id}.png')
            plt.savefig(plot_filename)
            plt.close(fig)
            num_plots_generated += 1

        print(f"Successfully generated and saved {num_plots_generated} individual track plots in '{output_dir_plots}'.")

except FileNotFoundError:
    print(f"Error: The file '{xml_file}' was not found. Please ensure TrackMate ran successfully and created the export file.")
except Exception as e:
    print(f"An error occurred during parsing, analysis, or plotting: {e}")"""


