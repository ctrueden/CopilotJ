"""

[[steps]]
id = 2
  [steps.action]
  name = "run_imagej_macro"
  script = """selectWindow("1832-48hours-gal-1.JPG (green)");

run("Duplicate...", "title=background");

run("Gaussian Blur...", "sigma=50");

imageCalculator("Divide create 32-bit", "1832-48hours-gal-1.JPG (green)","background");

selectWindow("Result of 1832-48hours-gal-1.JPG (green)");

run("8-bit");

rename("corrected_image");

selectWindow("background");

close();
"""

[[steps]]
id = 3
  [steps.action]
  name = "run_imagej_macro"
  script = """selectWindow("corrected_image");

getDimensions(width, height, channels, slices, frames);

roiManager("reset");


x_step = floor(width / 12);

y_step = floor(height / 8);


for (j = 0;
 j < 8;
 j++) {
  for (i = 0;
 i < 12;
 i++) {
    makeRectangle(i * x_step, j * y_step, x_step, y_step);

    roiManager("Add");

  }
}

roiManager("Measure");

saveAs("Results", "D:/vscode_project/ChatImageJ/temp/colony_measurements.csv");

run("Clear Results");
"""

[[steps]]
id = 4
  [steps.action]
  name = "execute_python_script"
  script = """import pandas as pd
import numpy as np
import matplotlib.pyplot as plt
import seaborn as sns
import os

csv_path = 'D:/vscode_project/ChatImageJ/temp/colony_measurements.csv'
output_path = 'D:/vscode_project/ChatImageJ/temp/colony_heatmap.png'

if not os.path.exists(csv_path):
    print(f"Error: The file {csv_path} was not found.")
else:
    df = pd.read_csv(csv_path)
    if 'Mean' in df.columns:
        mean_values = df['Mean'].values
        if len(mean_values) == 96:
            heatmap_data = np.reshape(mean_values, (8, 12))
            plt.figure(figsize=(12, 8))
            sns.heatmap(heatmap_data, annot=True, fmt=".1f", cmap='viridis', linewidths=.5)
            plt.title('Yeast Colony Mean Intensity')
            plt.xlabel('Colony Column')
            plt.ylabel('Colony Row')
            plt.tight_layout()
            plt.savefig(output_path)
            plt.close()
            print(f"Heatmap saved successfully to {output_path}")
        else:
            print(f"Error: Expected 96 measurements, but found {len(mean_values)}.")
    else:
        print("Error: 'Mean' column not found in the CSV file.")"""

