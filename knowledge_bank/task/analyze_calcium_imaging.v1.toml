  script = """#!/usr/bin/env python3

import os
import numpy as np
import pandas as pd
import tifffile
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt

from tqdm import tqdm
from scipy.fft import fft2, ifft2, fftshift
from scipy.ndimage import (
    gaussian_filter, gaussian_laplace,
    maximum_filter, binary_dilation, binary_erosion,
    generate_binary_structure, label, center_of_mass
)
from scipy.stats import linregress


# ============================================================
# CONFIG
# ============================================================
FILES = [
    r"C:/Users/10331/OneDrive/copilotj/12_Calcium_imaging_fus2/data_08.tif"
]
OUT_ROOT = r"C:/Users/10331/OneDrive/copilotj/12_Calcium_imaging_fus2/data_08_results"

FS = 3.0  # Hz
STIM_FRAMES_1BASED = np.array([91, 182, 273, 363, 453, 545, 635, 726, 816], dtype=int)
STIM_FRAMES = STIM_FRAMES_1BASED - 1  # 0-based

PRE_SEC = 5
POST_SEC = 25
BASELINE_SEC = 5         # baseline = last 5s immediately before stim
EARLY_SEC = 3            # true activation window: 0-3s after stim
PRE_RISE_SEC = 2         # pre/post: look at -2..0s slope
BG_WEIGHT = 0.7

# LoG detection params (tune if needed)
LOG_SIGMA = 2.0
PEAK_MIN_DIST = 10       # pixels (approx)
PEAK_THRESH_PCT = 99.5   # percentile on LoG response to keep peaks

# ROI/neuropil geometry (pixels)
ROI_RADIUS = 6
NEU_INNER_R = 10
NEU_OUTER_R = 20

# Motion correction
TEMPLATE_FRAMES = 50
TEMPLATE_UPDATE_EVERY = 50  # refresh template every N frames (robustness)

# Misc
EPS = 1e-8


# ============================================================
# UTILITIES
# ============================================================
def ensure_dir(p: str) -> None:
    os.makedirs(p, exist_ok=True)

def save_tif(path: str, arr: np.ndarray) -> None:
    tifffile.imwrite(path, arr.astype(np.float32, copy=False))

def seconds_to_frames(sec: float, fs: float) -> int:
    return int(round(sec * fs))

def clip_slice(a: int, b: int, n: int) -> slice:
    a = max(0, min(n, a))
    b = max(0, min(n, b))
    return slice(a, b)

def disk_mask(h, w, cx, cy, r):
    yy, xx = np.ogrid[:h, :w]
    return (xx - cx) * (xx - cx) + (yy - cy) * (yy - cy) <= r * r

def annulus_mask(h, w, cx, cy, r_in, r_out):
    yy, xx = np.ogrid[:h, :w]
    d2 = (xx - cx) * (xx - cx) + (yy - cy) * (yy - cy)
    return (d2 <= r_out * r_out) & (d2 >= r_in * r_in)

def phasecorr_shift(frame, template_fft):
    f_fft = fft2(frame)
    cc = fftshift(ifft2(f_fft * np.conjugate(template_fft))).real
    peak_y, peak_x = np.unravel_index(np.argmax(cc), cc.shape)
    h, w = frame.shape
    dy = peak_y - h // 2
    dx = peak_x - w // 2
    if dy > h // 2: dy -= h
    if dx > w // 2: dx -= w
    return dy, dx

def apply_integer_shift(frame, dy, dx):
    h, w = frame.shape
    yy, xx = np.meshgrid(np.arange(h), np.arange(w), indexing="ij")
    yy2 = (yy - dy) % h
    xx2 = (xx - dx) % w
    return frame[yy2, xx2]

def motion_correct(movie, template_frames=50, update_every=50):
    T, H, W = movie.shape
    reg = np.empty_like(movie, dtype=np.float32)

    template = np.median(movie[:template_frames], axis=0).astype(np.float32)
    template_fft = fft2(template)

    for t in tqdm(range(T), desc="Motion correction"):
        frame = movie[t].astype(np.float32)
        dy, dx = phasecorr_shift(frame, template_fft)
        reg[t] = apply_integer_shift(frame, dy, dx)

        if (t + 1) % update_every == 0:
            a = max(0, t + 1 - template_frames)
            template = np.median(reg[a:t + 1], axis=0).astype(np.float32)
            template_fft = fft2(template)

    return reg

def detect_rois_log(max_proj, sigma=2.0, min_dist=10, thresh_pct=99.5):
    # LoG: bright blobs -> negative values; take response = -LoG to get peaks positive
    resp = -gaussian_laplace(max_proj.astype(np.float32), sigma=sigma)
    resp = gaussian_filter(resp, 1.0)

    thr = np.percentile(resp, thresh_pct)
    candidates = resp > thr

    # local maxima
    footprint = np.ones((2 * min_dist + 1, 2 * min_dist + 1), dtype=bool)
    local_max = (resp == maximum_filter(resp, footprint=footprint)) & candidates

    ys, xs = np.where(local_max)
    # sort by response strength
    order = np.argsort(resp[ys, xs])[::-1]
    xs = xs[order]; ys = ys[order]

    peaks = []
    taken = np.zeros_like(resp, dtype=bool)
    for x, y in zip(xs, ys):
        if taken[y, x]:
            continue
        peaks.append((int(x), int(y)))
        # mark neighborhood as taken (non-max suppression)
        y0 = max(0, y - min_dist); y1 = min(resp.shape[0], y + min_dist + 1)
        x0 = max(0, x - min_dist); x1 = min(resp.shape[1], x + min_dist + 1)
        taken[y0:y1, x0:x1] = True

    return peaks, resp

def build_roi_and_neuropil_masks(H, W, peaks, roi_r, neu_in, neu_out):
    N = len(peaks)
    roi_masks = np.zeros((N, H, W), dtype=bool)
    label_map = np.zeros((H, W), dtype=np.int32)

    # Build ROI masks, avoid overlaps by priority order (given peaks sorted by strength)
    for i, (cx, cy) in enumerate(peaks, start=1):
        m = disk_mask(H, W, cx, cy, roi_r)
        m[label_map > 0] = False  # prevent overlaps
        roi_masks[i - 1] = m
        label_map[m] = i

    # Neuropil annulus per ROI, exclude all ROI
    all_roi = label_map > 0
    neu_masks = np.zeros((N, H, W), dtype=bool)
    for i, (cx, cy) in enumerate(peaks, start=1):
        ann = annulus_mask(H, W, cx, cy, neu_in, neu_out)
        ann[all_roi] = False
        neu_masks[i - 1] = ann

    # Centroids from ROI masks
    centroids = []
    for i in range(N):
        m = roi_masks[i]
        if m.sum() == 0:
            centroids.append((i + 1, -1, -1))
        else:
            cy, cx = center_of_mass(m.astype(np.float32))
            centroids.append((i + 1, int(round(cx)), int(round(cy))))

    return roi_masks, neu_masks, label_map, centroids

def extract_traces(movie, roi_masks, neu_masks):
    T, H, W = movie.shape
    N = roi_masks.shape[0]
    F = np.zeros((N, T), dtype=np.float32)
    B = np.zeros((N, T), dtype=np.float32)

    # Precompute indices
    roi_idx = [np.flatnonzero(roi_masks[i].ravel()) for i in range(N)]
    neu_idx = [np.flatnonzero(neu_masks[i].ravel()) for i in range(N)]

    flat = movie.reshape(T, -1)  # (T, H*W)

    for i in tqdm(range(N), desc="Extracting traces"):
        ridx = roi_idx[i]
        nidx = neu_idx[i]
        if ridx.size > 0:
            F[i] = flat[:, ridx].mean(axis=1)
        if nidx.size > 0:
            B[i] = flat[:, nidx].mean(axis=1)

    Fcorr = F - BG_WEIGHT * B
    return F, B, Fcorr

def make_stim_aligned(Fcorr, stim_frames, pre_f, post_f):
    N, T = Fcorr.shape
    K = len(stim_frames)
    win_len = pre_f + post_f

    Fc_win = np.full((N, K, win_len), np.nan, dtype=np.float32)
    valid = np.zeros((K, win_len), dtype=bool)

    for k, s in enumerate(stim_frames):
        a = s - pre_f
        b = s + post_f  # exclusive
        src = clip_slice(a, b, T)
        seg = Fcorr[:, src]  # (N, seg_len)
        seg_len = seg.shape[1]

        # destination indices so that stim aligns at pre_f
        # if a<0, left padding occurs
        dst_start = max(0, -a)
        dst_end = dst_start + seg_len
        Fc_win[:, k, dst_start:dst_end] = seg
        valid[k, dst_start:dst_end] = True

    return Fc_win, valid

def baseline_zscore_and_relative(Fc_win, pre_f, base_f):
    N, K, L = Fc_win.shape
    b0 = max(0, pre_f - base_f)
    b1 = pre_f

    base_seg = Fc_win[:, :, b0:b1]  # (N,K,base_f)
    F0 = np.nanmean(base_seg, axis=2, keepdims=True)  # (N,K,1)

    rel = (Fc_win - F0) / np.maximum(F0, EPS)

    rel_base = rel[:, :, b0:b1]
    mu = np.nanmean(rel_base, axis=2, keepdims=True)
    sd = np.nanstd(rel_base, axis=2, keepdims=True)
    sd = np.maximum(sd, EPS)
    z = (rel - mu) / sd
    return rel.astype(np.float32), z.astype(np.float32)

def classify_events(rel, z, pre_f, early_f):
    N, K, L = z.shape
    labels = np.zeros((N, K), dtype=np.int8)  # 1 act, -1 inh, 0 none

    # Coarse classification: OR logic
    any_act_z = np.nanmax(z, axis=2) >= 2
    any_act_rel = np.nanmax(rel, axis=2) > 2
    any_inh_z = np.nanmin(z, axis=2) <= -2
    any_inh_rel = np.nanmin(rel, axis=2) < -2
    
    any_act = any_act_z | any_act_rel
    any_inh = any_inh_z | any_inh_rel
    labels[any_act] = 1
    labels[(~any_act) & any_inh] = -1

    # True activation: AND logic in early window (0-3s)
    ew = slice(pre_f, min(pre_f + early_f, L))
    ew_z = z[:, :, ew]
    ew_rel = rel[:, :, ew]
    true_act = (np.nanmax(ew_z, axis=2) >= 2) & (np.nanmax(ew_rel, axis=2) > 2)

    return labels, true_act

def pre_post_by_event(rel, true_act, pre_f, pre2_f, slope_thr=0.2):
    N, K, L = rel.shape
    event_type = np.zeros((N, K), dtype=np.int8)

    w = slice(max(0, pre_f - pre2_f), pre_f)
    x = np.arange(w.stop - w.start, dtype=np.float32)
    if x.size < 2:
        return event_type

    for n in range(N):
        for k in range(K):
            if not true_act[n, k]:
                continue
            y = rel[n, k, w]
            if np.any(~np.isfinite(y)) or y.size < 2:
                event_type[n, k] = 2
                continue
            slope = linregress(x, y).slope
            event_type[n, k] = 1 if slope > slope_thr else 2

    return event_type


# ============================================================
# MAIN PIPELINE
# ============================================================
def process_one(tif_path: str):
    fname = os.path.basename(tif_path)
    base = os.path.splitext(fname)[0]
    out_dir = os.path.join(OUT_ROOT, base)
    ensure_dir(out_dir)

    print(f"\n=== Processing {fname} ===")
    movie = tifffile.imread(tif_path).astype(np.float32)  # (T,H,W)
    T, H, W = movie.shape
    print(f"Loaded: T={T}, H={H}, W={W}, FS={FS}Hz")

    # Motion correction
    reg = motion_correct(movie, TEMPLATE_FRAMES, TEMPLATE_UPDATE_EVERY)
    save_tif(os.path.join(out_dir, f"{base}_mc.tif"), reg)
    print("Saved motion-corrected TIFF.")

    # Segmentation (LoG on max projection)
    max_proj = np.max(reg, axis=0)
    peaks, log_resp = detect_rois_log(max_proj, sigma=LOG_SIGMA, min_dist=PEAK_MIN_DIST, thresh_pct=PEAK_THRESH_PCT)
    print(f"Detected peaks (candidate neurons): {len(peaks)}")

    roi_masks, neu_masks, label_map, centroids = build_roi_and_neuropil_masks(
        H, W, peaks, ROI_RADIUS, NEU_INNER_R, NEU_OUTER_R
    )
    N = roi_masks.shape[0]
    print(f"Final ROIs (after overlap removal): {N}")

    # Save ROI label map + centroids
    tifffile.imwrite(os.path.join(out_dir, f"{base}_roi_id_map.tif"), label_map.astype(np.int32))
    pd.DataFrame(centroids, columns=["neuron_id", "x", "y"]).to_csv(
        os.path.join(out_dir, f"{base}_centroids.csv"), index=False
    )

    # Extract traces
    F_roi, F_bg, Fcorr = extract_traces(reg, roi_masks, neu_masks)
    np.savez_compressed(
        os.path.join(out_dir, f"{base}_traces_raw.npz"),
        F_roi=F_roi, F_bg=F_bg, Fcorr=Fcorr
    )

    # Stim-aligned windows (strict alignment: stim at index pre_f)
    pre_f = seconds_to_frames(PRE_SEC, FS)
    post_f = seconds_to_frames(POST_SEC, FS)
    base_f = seconds_to_frames(BASELINE_SEC, FS)
    early_f = seconds_to_frames(EARLY_SEC, FS)
    pre2_f = seconds_to_frames(PRE_RISE_SEC, FS)

    Fc_win, valid = make_stim_aligned(Fcorr, STIM_FRAMES, pre_f, post_f)
    rel, z = baseline_zscore_and_relative(Fc_win, pre_f, base_f)

    # Classification
    labels, true_act = classify_events(rel, z, pre_f, early_f)
    event_type = pre_post_by_event(rel, true_act, pre_f, pre2_f, slope_thr=0.2)  # 1 preex, 2 postex

    # Neuron-level categories + success rate (postex)
    neuron_any_true = true_act.any(axis=1)
    neuron_any_pre = (event_type == 1).any(axis=1)
    neuron_any_post = (event_type == 2).any(axis=1)

    neuron_class = np.full(N, "none", dtype=object)
    neuron_class[neuron_any_true & neuron_any_post & ~neuron_any_pre] = "postex"
    neuron_class[neuron_any_true & neuron_any_pre] = "preex"  # if any pre event, call it preex (stricter)

    # success rate: for postex neurons only
    post_mask = neuron_class == "postex"
    success_rate = np.zeros(N, dtype=np.float32)
    success_rate[post_mask] = true_act[post_mask].mean(axis=1)

    # Save analysis arrays
    np.savez_compressed(
        os.path.join(out_dir, f"{base}_analysis.npz"),
        stim_frames_1based=STIM_FRAMES_1BASED,
        Fs=np.array([FS], dtype=np.float32),
        rel=rel, z=z,
        labels=labels, true_act=true_act,
        event_type=event_type,
        neuron_class=neuron_class,
        success_rate=success_rate
    )

    # Per-event table (for heatmap + audit)
    rows = []
    for n in range(N):
        for k in range(len(STIM_FRAMES)):
            ew = slice(pre_f, pre_f + early_f)
            peak_rel_early = float(np.nanmax(rel[n, k, ew]))
            peak_z_early = float(np.nanmax(z[n, k, ew]))
            rows.append({
                "neuron_id": n + 1,
                "stim_index": k + 1,
                "stim_frame": int(STIM_FRAMES_1BASED[k]),
                "label_coarse": int(labels[n, k]),
                "true_activated": bool(true_act[n, k]),
                "event_type": int(event_type[n, k]),  # 0 none, 1 preex, 2 postex
                "peak_rel_0_3s": peak_rel_early,
                "peak_z_0_3s": peak_z_early
            })
    event_df = pd.DataFrame(rows)
    event_df.to_csv(os.path.join(out_dir, f"{base}_event_table.csv"), index=False)

    # Neuron summary table
    neuron_df = pd.DataFrame({
        "neuron_id": np.arange(1, N + 1),
        "x": [c[1] for c in centroids],
        "y": [c[2] for c in centroids],
        "class": neuron_class,
        "activated_any": neuron_any_true,
        "success_rate_postex": success_rate
    })
    neuron_df.to_csv(os.path.join(out_dir, f"{base}_neuron_summary.csv"), index=False)

    # ------------------------------------------------------------
    # Plots: per-neuron (all), stability heatmaps, spatial map
    # ------------------------------------------------------------
    t_full = np.arange(T) / FS
    win_t = (np.arange(pre_f + post_f) - pre_f) / FS

    # (A) Per-neuron plots (3 panels)
    for n in tqdm(range(N), desc="Per-neuron plots"):
        fig, axes = plt.subplots(3, 1, figsize=(12, 8))

        # 1) Fcorr over time with stim markers
        axes[0].plot(t_full, Fcorr[n], lw=0.6)
        for s in STIM_FRAMES:
            axes[0].axvline(s / FS, ls="--", alpha=0.3)
        axes[0].set_title(f"Neuron {n+1}: Background-corrected fluorescence")
        axes[0].set_ylabel("Fcorr (a.u.)")
        axes[0].grid(alpha=0.2)

        # 2) Relative change per stim
        for k in range(len(STIM_FRAMES)):
            axes[1].plot(win_t, rel[n, k], alpha=0.7)
        axes[1].axvline(0, ls="--", alpha=0.4)
        axes[1].set_title("Relative fluorescence change (stim-aligned)")
        axes[1].set_ylabel("relative change")
        axes[1].set_xlabel("Time (s)")
        axes[1].grid(alpha=0.2)

        # 3) Z-score per stim (green if true act)
        for k in range(len(STIM_FRAMES)):
            col = "green" if true_act[n, k] else ("red" if labels[n, k] == -1 else "gray")
            axes[2].plot(win_t, z[n, k], color=col, alpha=0.7)
        axes[2].axhline(2, ls="--", alpha=0.5)
        axes[2].axhline(-2, ls="--", alpha=0.5)
        axes[2].axvline(0, ls="--", alpha=0.4)
        axes[2].set_title("Baseline z-score (per neuron × per stimulation)")
        axes[2].set_ylabel("z")
        axes[2].set_xlabel("Time (s)")
        axes[2].grid(alpha=0.2)

        plt.tight_layout()
        plt.savefig(os.path.join(out_dir, f"{base}_neuron_{n+1:03d}_analysis.png"), dpi=150)
        plt.close(fig)


    # Summary numbers
    n_true = int(neuron_any_true.sum())
    n_pre = int((neuron_class == "preex").sum())
    n_post = int((neuron_class == "postex").sum())
    mean_succ = float(success_rate[post_mask].mean()) if post_mask.any() else float("nan")

    summary = pd.DataFrame([{
        "file": fname,
        "total_neurons": N,
        "activated_any_true": n_true,
        "preex_neurons": n_pre,
        "postex_neurons": n_post,
        "postex_success_rate_mean": mean_succ
    }])
    summary.to_csv(os.path.join(out_dir, f"{base}_summary.csv"), index=False)

    print(f"Done: {out_dir}")
    return summary


def main():
    ensure_dir(OUT_ROOT)
    all_sum = []
    for f in FILES:
        if not os.path.exists(f):
            print(f"File not found: {f}")
            continue
        all_sum.append(process_one(f))

    if all_sum:
        pd.concat(all_sum, ignore_index=True).to_csv(os.path.join(OUT_ROOT, "summary_all_files.csv"), index=False)
        print("Saved summary_all_files.csv")


if __name__ == "__main__":
    main()"""


