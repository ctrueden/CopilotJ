FS: Optional[float] = 3.0      # Hz or None

# Stim frames (0-based). If you prefer seconds, set STIM_SECONDS and leave STIM_FRAMES=None.
STIM_FRAMES  = np.array([91,182,273,363,453,545,635,726,816]) - 1
