id = 1
  [steps.action]
  name = "execute_python_script"
  script = """import os import glob import numpy as np import pandas as pd from skimage.io import imread, imsave from skimage.exposure import rescale_intensity from skimage.filters import threshold_otsu, gaussian from skimage.measure import label, regionprops_table from skimage.color import label2rgb from skimage.morphology import remove_small_objects, binary_opening, disk import matplotlib.pyplot as plt # Paths input_dir = r'C:/Users/10331/OneDrive/chatImageJ/claim_1/1_6_Colocalization/images' output_dir = r'D:/vscode_project/ChatImageJ/temp/coloc_results/' os.makedirs(output_dir, exist_ok=True) # Colocalization cutoff (fractional overlap with paired mask) COLOC_THRESH = 0.2 # Helper: Find paired image files R_files = sorted([f for f in os.listdir(input_dir) if f.endswith('_N_R.png')]) results_summary = [] for R_fname in R_files: G_fname = R_fname.replace('_N_R.png', '_N_G.png') R_path = os.path.join(input_dir, R_fname) G_path = os.path.join(input_dir, G_fname) if not os.path.exists(G_path): print(f"No pair found for {R_fname}; skipping.") continue # Load and rescale images img_R = imread(R_path).astype(np.float32) img_G = imread(G_path).astype(np.float32) # Normalize both channels to 0-1 for fair comparison img_R = rescale_intensity(img_R, out_range=(0, 1)) img_G = rescale_intensity(img_G, out_range=(0, 1)) # Optionally de-noise (light Gaussian for consistent thresholding) img_Rf = gaussian(img_R, sigma=1) img_Gf = gaussian(img_G, sigma=1) # Threshold both channels th_R = threshold_otsu(img_Rf) th_G = threshold_otsu(img_Gf) mask_R = img_Rf > th_R mask_G = img_Gf > th_G # Remove small specks (min_size=20 px) mask_R = remove_small_objects(mask_R, min_size=20) mask_G = remove_small_objects(mask_G, min_size=20) mask_R = binary_opening(mask_R, disk(1)) mask_G = binary_opening(mask_G, disk(1)) # Label objects in both channels label_R = label(mask_R) label_G = label(mask_G) n_R = label_R.max() n_G = label_G.max() # Colocalization analysis (simple pixel correlation) pearson = np.corrcoef(img_Rf.ravel(), img_Gf.ravel())[0,1] # Manders: See M1/M2 (fraction R pixels in G mask, vice versa) M1 = np.sum(img_Rf[mask_G]) / np.sum(img_Rf) if np.sum(img_Rf) > 0 else np.nan M2 = np.sum(img_Gf[mask_R]) / np.sum(img_Gf) if np.sum(img_Gf) > 0 else np.nan # Objectwise mapping: for each R object, overlap with G objects rowlist = [] for i in range(1, n_R+1): objmask = (label_R == i) obj_area = np.sum(objmask) overlap = objmask & (label_G > 0) overlap_frac = np.sum(overlap)/obj_area if obj_area > 0 else 0 coloc_status = 'colocalized' if overlap_frac >= COLOC_THRESH else 'not-colocalized' rowlist.append({ 'R_obj': i, 'area': obj_area, 'overlap_area': np.sum(overlap), 'overlap_fraction': overlap_frac, 'colocalization': coloc_status }) object_df = pd.DataFrame(rowlist) # Overlay image construction colormap = np.zeros((*img_R.shape, 3), dtype=np.float32) colormap[...,0] = rescale_intensity(img_Rf, out_range=(0,1)) # Red colormap[...,1] = rescale_intensity(img_Gf, out_range=(0,1)) # Green overlay = colormap.copy() # Mark colocalized R objects in blue outline # Use regionprops to get object coords from skimage.segmentation import find_boundaries for idx,r in object_df.iterrows(): objmask = (label_R == r['R_obj']) bd = find_boundaries(objmask, mode='outer') # Blue for coloc, white for not-coloc outline_color = (0,0,1) if r['colocalization'] == 'colocalized' else (1,1,1) for ch in range(3): overlay[...,ch][bd] = outline_color[ch] # Save annotated overlays and masks base = os.path.splitext(R_fname)[0].replace('_N_R','') f_overlay = os.path.join(output_dir, f'{base}_overlay.png') f_maskR = os.path.join(output_dir, f'{base}_R_mask.png') f_maskG = os.path.join(output_dir, f'{base}_G_mask.png') f_csv_obj = os.path.join(output_dir, f'{base}_object_table.csv') imsave(f_overlay, (overlay*255).astype(np.uint8)) imsave(f_maskR, (mask_R*255).astype(np.uint8)) imsave(f_maskG, (mask_G*255).astype(np.uint8)) object_df.to_csv(f_csv_obj, index=False) results_summary.append({ 'pair': base, 'n_R': n_R, 'n_G': n_G, 'pearson_coeff': pearson, 'Manders_M1': M1, 'Manders_M2': M2, 'R_colocalized_objects': (object_df['colocalization']=='colocalized').sum(), 'R_total_objects': n_R }) print(f'Processed {base}: n_R={n_R}, n_G={n_G}, Pearson={pearson:.3f}, M1={M1:.3f}, M2={M2:.3f}') # Save summary CSV summary_df = pd.DataFrame(results_summary) f_summary = os.path.join(output_dir, 'summary_coloc_results.csv') summary_df.to_csv(f_summary, index=False) # Optionally show a montage of the first overlay if len(results_summary) > 0: overlayfile = os.path.join(output_dir, f"{results_summary[0]['pair']}_overlay.png") from PIL import Image img = Image.open(overlayfile) img.show()"""


