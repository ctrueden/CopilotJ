import os
import torch
import torch.nn as nn
from torch.utils.data import Dataset, DataLoader
from torchvision import transforms
from PIL import Image
import numpy as np
from pathlib import Path
import yaml


class WBCDataset(Dataset):
    
    def __init__(self, image_dir, transform=None):
        self.image_dir = Path(image_dir)
        self.transform = transform
        
        # Supported image formats - use set to avoid duplicates on case-insensitive filesystems
        image_paths_set = set()
        for ext in ['*.jpg', '*.jpeg', '*.png', '*.bmp', '*.tif', '*.tiff']:
            image_paths_set.update(self.image_dir.glob(ext))
            image_paths_set.update(self.image_dir.glob(ext.upper()))
        
        self.image_paths = sorted(list(image_paths_set))
        
    def __len__(self):
        return len(self.image_paths)
    
    def __getitem__(self, idx):
        img_path = self.image_paths[idx]
        image = Image.open(img_path).convert('RGB')
        
        if self.transform:
            image = self.transform(image)
        
        return image, str(img_path.name)


def load_model(checkpoint_path, num_classes=4, device='cuda'):
    from torchvision.models import efficientnet_b0, EfficientNet_B0_Weights
    
    # Load pretrained model architecture
    model = efficientnet_b0(weights=None)
    
    # Modify the classifier for the number of classes
    num_features = model.classifier[1].in_features
    model.classifier[1] = nn.Linear(num_features, num_classes)
    
    # Load checkpoint (weights_only=False for compatibility with older checkpoints)
    checkpoint = torch.load(checkpoint_path, map_location=device, weights_only=False)
    
    # Handle different checkpoint formats
    if 'model_state_dict' in checkpoint:
        model.load_state_dict(checkpoint['model_state_dict'])
    elif 'model' in checkpoint:
        model.load_state_dict(checkpoint['model'])
    elif 'state_dict' in checkpoint:
        model.load_state_dict(checkpoint['state_dict'])
    else:
        model.load_state_dict(checkpoint)
    
    model = model.to(device)
    model.eval()
    
    return model


def get_transforms(image_size=(224, 224)):
    # BiaPy uses TYPE: div normalization which just divides by 255 (no mean/std normalization)
    return transforms.Compose([
        transforms.Resize(image_size, interpolation=transforms.InterpolationMode.BILINEAR, antialias=True),
        transforms.ToTensor(),
        # ToTensor already converts to [0, 1] by dividing by 255, so no additional normalization needed
    ])


def predict(model, dataloader, class_names, device='cuda'):
    predictions = []
    
    with torch.no_grad():
        for images, filenames in dataloader:
            images = images.to(device)
            
            # Forward pass
            outputs = model(images)
            probabilities = torch.softmax(outputs, dim=1)
            predicted_classes = torch.argmax(probabilities, dim=1)
            
            # Store results
            for i, filename in enumerate(filenames):
                pred_class = predicted_classes[i].item()
                probs = probabilities[i].cpu().numpy()
                
                predictions.append({
                    'filename': filename,
                    'predicted_class': class_names[pred_class],
                    'predicted_class_idx': pred_class,
                    'confidence': probs[pred_class],
                    'probabilities': {class_names[j]: probs[j] for j in range(len(class_names))}
                })
    
    return predictions


def main():
    # Configuration
    MODEL_DIR = r"D:/vscode_project/ChatImageJ/temp/wbc_classification/wbc_classification_20251225_214050"
    CHECKPOINT_PATH = os.path.join(MODEL_DIR, "checkpoints", "wbc_classification_20251225_214050_1-checkpoint-best.pth")
    CONFIG_PATH = os.path.join(MODEL_DIR, "config_files", "wbc_config.yaml")
    
    # User to specify the test images directory
    TEST_IMAGES_DIR = r"C:/Users/10331/OneDrive/copilotj/14_dl_cls/test_images"
    
    # WBC class names (adjust based on your training data)
    # Common WBC types: Eosinophil, Lymphocyte, Monocyte, Neutrophil
    CLASS_NAMES = ['Eosinophil', 'Lymphocyte', 'Monocyte', 'Neutrophil']
    
    # Device configuration
    device = torch.device('cuda' if torch.cuda.is_available() else 'cpu')
    print(f"Using device: {device}")
    
    # Load configuration
    with open(CONFIG_PATH, 'r') as f:
        config = yaml.safe_load(f)
    
    num_classes = config['MODEL']['N_CLASSES']
    image_size = tuple(config['DATA']['PATCH_SIZE'][:2])
    
    print(f"Model: {config['MODEL']['ARCHITECTURE']}")
    print(f"Number of classes: {num_classes}")
    print(f"Image size: {image_size}")
    
    # Verify class names match number of classes
    if len(CLASS_NAMES) != num_classes:
        print(f"Warning: Number of class names ({len(CLASS_NAMES)}) doesn't match model classes ({num_classes})")
        CLASS_NAMES = [f'Class_{i}' for i in range(num_classes)]
    
    # Load model
    print(f"\nLoading model from: {CHECKPOINT_PATH}")
    model = load_model(CHECKPOINT_PATH, num_classes=num_classes, device=device)
    print("Model loaded successfully!")
    
    # Prepare dataset and dataloader
    transform = get_transforms(image_size)
    dataset = WBCDataset(TEST_IMAGES_DIR, transform=transform)
    
    if len(dataset) == 0:
        print(f"\nError: No images found in {TEST_IMAGES_DIR}")
        print("Supported formats: jpg, jpeg, png, bmp, tif, tiff")
        return
    
    print(f"\nFound {len(dataset)} images to classify")
    
    dataloader = DataLoader(dataset, batch_size=8, shuffle=False, num_workers=0)
    
    # Run predictions
    print("\nRunning inference...")
    predictions = predict(model, dataloader, CLASS_NAMES, device=device)
    
    # Display results
    print("\n" + "="*80)
    print("CLASSIFICATION RESULTS")
    print("="*80)
    
    for pred in predictions:
        print(f"\nImage: {pred['filename']}")
        print(f"Predicted Class: {pred['predicted_class']}")
        print(f"Confidence: {pred['confidence']:.4f}")
        print("All Probabilities:")
        for class_name, prob in pred['probabilities'].items():
            print(f"  {class_name}: {prob:.4f}")
    
    # Save results to file
    output_file = os.path.join(MODEL_DIR, "results", "inference_results.txt")
    os.makedirs(os.path.dirname(output_file), exist_ok=True)
    
    with open(output_file, 'w') as f:
        f.write("WBC Classification Results\n")
        f.write("="*80 + "\n\n")
        
        for pred in predictions:
            f.write(f"Image: {pred['filename']}\n")
            f.write(f"Predicted Class: {pred['predicted_class']}\n")
            f.write(f"Confidence: {pred['confidence']:.4f}\n")
            f.write("All Probabilities:\n")
            for class_name, prob in pred['probabilities'].items():
                f.write(f"  {class_name}: {prob:.4f}\n")
            f.write("\n")
    
    print(f"\nResults saved to: {output_file}")
    
    # Summary statistics
    print("\n" + "="*80)
    print("SUMMARY")
    print("="*80)
    
    class_counts = {}
    for pred in predictions:
        class_name = pred['predicted_class']
        class_counts[class_name] = class_counts.get(class_name, 0) + 1
    
    for class_name, count in sorted(class_counts.items()):
        percentage = (count / len(predictions)) * 100
        print(f"{class_name}: {count} ({percentage:.1f}%)")


if __name__ == "__main__":
    main()


"""

