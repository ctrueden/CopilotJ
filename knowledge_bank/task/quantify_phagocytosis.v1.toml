[[steps]]
id = 6
  [steps.action]
  name = "execute_python_script"
  script = """import pandas as pd
import matplotlib.pyplot as plt
import seaborn as sns

# Define file paths
csv_path = '/Users/jacklu/vscode_project/ChatImageJ/temp/phagocytosis_measurements.csv'
output_plot_path = '/Users/jacklu/vscode_project/ChatImageJ/temp/phagocytosis_histogram.png'

# Load the measurement data
data = pd.read_csv(csv_path)

# --- Data Analysis ---
# Calculate Mean Intensity since it's not in the results file
# Mean Intensity = Integrated Density / Area
if 'IntDen' in data.columns and 'Area' in data.columns:
    data['MeanIntensity'] = data['IntDen'] / data['Area']
else:
    print("Error: 'IntDen' or 'Area' columns not found in the CSV file.")
    exit()

mean_intensity_series = data['MeanIntensity']

# Calculate key statistics
number_of_cells = len(mean_intensity_series)
average_phagocytosis = mean_intensity_series.mean()
std_dev_phagocytosis = mean_intensity_series.std()

# --- Visualization ---
plt.style.use('seaborn-v0_8-whitegrid')
fig, ax = plt.subplots(figsize=(10, 6))

sns.histplot(mean_intensity_series, kde=True, ax=ax, bins=30, color='skyblue')

ax.set_title('Distribution of Phagocytosis Efficiency', fontsize=16)
ax.set_xlabel('Mean Fluorescence Intensity per Cell', fontsize=12)
ax.set_ylabel('Number of Cells', fontsize=12)

# Add a vertical line for the average intensity
ax.axvline(average_phagocytosis, color='r', linestyle='--', label=f'Average = {average_phagocytosis:.2f}')
ax.legend()

# Save the figure
plt.savefig(output_plot_path)

# --- Summary Report ---
print('--- Phagocytosis Analysis Summary ---')
print(f'Total number of cells analyzed: {number_of_cells}')
print(f'Average fluorescence intensity per cell: {average_phagocytosis:.2f}')
print(f'Standard deviation of intensity: {std_dev_phagocytosis:.2f}')
print(f'\nHistogram plot saved to: {output_plot_path}')
"""


