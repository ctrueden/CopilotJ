name: Build Docker Images

on:
  workflow_dispatch:
    inputs:
      export_artifacts:
        description: Export built images as workflow artifacts
        required: false
        type: boolean
        default: true
      push_images:
        description: Push images to GHCR
        required: false
        type: boolean
        default: false
      image_tag:
        description: Image tag to build
        required: false
        type: string
        default: manual

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  PYTHON_IMAGE_NAME: copilotj-python
  WEB_IMAGE_NAME: copilotj-web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push_images }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Python image
        uses: docker/build-push-action@v6
        id: build_python
        with:
          context: .
          file: ./Dockerfile
          load: ${{ inputs.export_artifacts }}
          push: ${{ inputs.push_images }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.PYTHON_IMAGE_NAME }}:${{ inputs.image_tag }}
          cache-from: type=gha,scope=python-image
          cache-to: type=gha,mode=max,scope=python-image

      - name: Build web image
        uses: docker/build-push-action@v6
        id: build_web
        with:
          context: ./web
          file: ./web/Dockerfile
          load: ${{ inputs.export_artifacts }}
          push: ${{ inputs.push_images }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.WEB_IMAGE_NAME }}:${{ inputs.image_tag }}
          cache-from: type=gha,scope=web-image
          cache-to: type=gha,mode=max,scope=web-image

      - name: Export Docker images
        if: ${{ inputs.export_artifacts }}
        run: |
          mkdir -p dist
          docker save \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.PYTHON_IMAGE_NAME }}:${{ inputs.image_tag }} \
            | gzip > dist/${{ env.PYTHON_IMAGE_NAME }}-${{ inputs.image_tag }}.tar.gz
          docker save \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.WEB_IMAGE_NAME }}:${{ inputs.image_tag }} \
            | gzip > dist/${{ env.WEB_IMAGE_NAME }}-${{ inputs.image_tag }}.tar.gz

      - name: Upload image artifacts
        if: ${{ inputs.export_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ inputs.image_tag }}
          path: dist/*.tar.gz
          if-no-files-found: error
