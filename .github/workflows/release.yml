name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to build (e.g. 0.0.2)
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHON_IMAGE_NAME: copilotj-python
  WEB_IMAGE_NAME: copilotj-web

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Lowercase Docker namespace
        id: namespace
        run: echo "NAME=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # ── Docker Images ──────────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TODO: Python image is ~14GB, skipping until needed
      # - name: Build Python image
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     file: ./Dockerfile
      #     load: true
      #     tags: ${{ env.PYTHON_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
      #     cache-from: type=gha,scope=python-image
      #     cache-to: type=gha,mode=max,scope=python-image

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          load: true
          tags: ${{ env.WEB_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=web-image
          cache-to: type=gha,mode=max,scope=web-image

      - name: Export Web image
        run: |
          docker save ${{ env.WEB_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }} \
            | gzip > ${{ env.WEB_IMAGE_NAME }}-${{ steps.version.outputs.VERSION }}.tar.gz

      # ── JAR Library ────────────────────────────────────────────────

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "8"

      - name: Set Maven version
        working-directory: plugin
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPom=false

      - name: Build JAR
        working-directory: plugin
        run: mvn -B -DskipTests package

      - name: Rename JAR for release
        run: |
          cp plugin/target/CopilotJBridge-${{ steps.version.outputs.VERSION }}.jar \
            CopilotJBridge-${{ steps.version.outputs.VERSION }}.jar

      # ── GitHub Release ─────────────────────────────────────────────

      - name: Create GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            CopilotJBridge-${{ steps.version.outputs.VERSION }}.jar
            ${{ env.WEB_IMAGE_NAME }}-${{ steps.version.outputs.VERSION }}.tar.gz
