
["StarDist 2D"]
description = """
Deep learning nuclei segmentation plugin. Requires special Command From Macro wrapper.\
"""
correct_syntax = """
run("Command From Macro", "command=[de.csbdresden.stardist.StarDist2D], \
args=['input':'nuclei_duplicated', 'modelChoice':'Versatile (fluorescent nuclei)', \
'normalizeInput':'true', 'percentileBottom':'1.0', 'percentileTop':'99.8', 'probThresh':'0.5', \
'nmsThresh':'0.3', 'outputType':'Both', 'nTiles':'1', 'excludeBoundary':'2', \
'roiPosition':'Automatic', 'verbose':'false', 'showCsbdeepProgress':'false', \
'showProbAndDist':'false'], process=[false]");selectImage("Label Image");roiManager("Measure\");\
"""
tips = [
  """
1. modelChoice from the following models: "Versatile (fluorescent nuclei)", "Versatile (H&E nuclei)", "DSB 2018 (from StarDist 2D paper)".
2. The results title is usually 'Label Image'. After run stardist, you can use the \
"roiManager("Measure"); " to measure, get the statistics(number, area, etc.) of the detected \
nuclei. 3. The StarDist2D plugin is configured by specifying the input image (e.g. \
"nuclei_duplicated") and choosing a pre-trained model such as "Versatile (fluorescent nuclei)" \
or a custom weight file; you can enable normalizeInput=true to rescale intensities to [0,1] with \
percentile clipping (percentileBottom and percentileTop, typically 1-5 and 95-99) to reduce \
extreme values. The key detection thresholds are probThresh (default 0.5)—raise it (0.6-0.8) to \
eliminate weak false positives or lower it (0.3-0.4) to capture faint objects—and nmsThresh \
(default 0.3) to control non-max suppression of overlapping objects (lower values enforce \
stricter separation). Choose outputType as "Mask," "Overlay," or "Both," and if you have very \
large images or limited memory, set nTiles>1. Use excludeBoundary (0-2) to drop partial objects \
at the border and roiPosition ("Automatic," "Image," or "ROI Manager") to control where ROIs \
appear. Finally, enable verbose, showCsbdeepProgress, or showProbAndDist for detailed logs and \
intermediate maps during development, then disable them for routine batch processing.\
4. Input axis of type Channel must have size 1, adjust the channel before use it.
""",
]
site = "https://imagej.net/plugins/stardist"

