[TrackMate]
description = """
General-purpose spot detection and tracking plugin for ImageJ/Fiji. Headless mode supports full \
parameterization via macro calls.\
"""
correct_syntax = """
run("TrackMate", "use_gui=false detector=[LoG detector (Laplacian of Gaussian)] radius=5.0 \
threshold=10.0 subpixel=false median=true channel=1 tracker=[Simple LAP tracker] \
linking.max_distance=5.0 gap_closing.max_distance=5.0 gap_closing.max_frame_gap=0 \
filter_spots=[QUALITY filter] QUALITY=0.0 filter_tracks=[TRACK_DURATION filter] TRACK_DURATION=1 \
display_results=true save_to=[C:/Users/10331/OneDrive/Desktop/TrackMateSaveTest2.xml] \
export_to=[C:/Users/10331/OneDrive/Desktop/TrackMateExportTest2.xml]");\
"""
tips = [
  """
1. Use the Macro Recorder to generate the exact argument string for your data, and ensure the \
target image window is selected before running.\
""",
  """
2. radius and threshold control spot detection—tune radius to your object size and threshold to \
eliminate background noise.\
""",
  """
3. File paths for save_to and export_to must be enclosed in square brackets (e.g. \
save_to=[C:/path/to/file.xml]).\
""",
  """
4. median=true applies a 3×3 median filter before detection to reduce salt-and-pepper noise.\
""",
  """
5. channel selects which channel in a multi-channel stack to analyze.\
""",
  """
6. linking.max_distance and gap_closing.max_distance define how far a spot may move between \
frames; gap_closing.max_frame_gap sets how many frames may be skipped.\
""",
  """
7. If use_gui=true, the GUI will open and ignore other macro parameters as defaults.\
""",
  """
8. save_to writes the full TrackMate model XML, while export_to writes a simplified tracks-only \
XML.
""",
  """
9. display_results=true overlays detected spots and tracks on the image.\
""",
  """
10. Always specify both detector and tracker in square brackets (e.g. detector=[LoG detector…], \
tracker=[Simple LAP tracker]) or TrackMate will skip those steps.\
""",
  """
11. Use forward-slashes or escape backslashes in Windows paths (e.g. C:/Users/… or \
C:\\\\Users\\\\…) to avoid file-not-found errors.\
""",
  """
12. If you see "spot collection is empty," increase blob radius, lower threshold, or toggle \
median filtering, and test interactively in GUI mode (use_gui=true + Preview).\
""",
  """
13. For batch processing, record working parameters with the Macro Recorder and paste them into a \
headless macro to ensure consistency.\
""",
  """
14. After running TrackMate, you can check the files saved in the specified paths to verify the \
results.\
""",
]
site = "https://imagej.net/plugins/trackmate"

["Coloc 2"]
description = "Colocalization analysis plugin. Use 'channel1' and 'channel2' parameters."
correct_syntax = """
run("Coloc 2", "channel_1=cropped_01_POS076_D.tif channel_2=CropGreen.tif roi_or_mask=<None> \
threshold_regression=Costes show_save_pdf_dialog li_histogram_channel_1 li_histogram_channel_2 \
li_icq spearman's_rank_correlation manders'_correlation kendall's_tau_rank_correlation \
2d_intensity_histogram costes'_significance_test psf=3 costes_randomisations=10\");\
"""
tips = [
  "1. Adjust costes_randomisations for significance testing (default is 10).",
  "2. Ensure images are pre-processed (e.g., background subtraction) before coloc analysis.",
  "3. You need a 2-color channel image. If more than 2 channels, split them first (Image → Color → Split Channels).",
  "4. Z stacks work fine, but time series will fail. Split time series into numbered images first.",
  "5. For ROI analysis, you have 2 options:",
  "   - Select ROI with ImageJ selection tools (applies to all slices in z-stack)",
  "   - Use a binary mask image with same x,y,z dimensions (white=255 for analysis, black=0 to ignore)",
  "6. In GUI, select your 2 images in the first 2 dropdown lists as channel 1 and channel 2.",
  "7. Third dropdown: select ROI/mask image (must have same xyz dimensions as the other 2 images).",
  "8. Results appear in ImageJ Log window as comma-separated values for export.",
  "9. Set PSF size (in pixels) - determines size of image chunks for randomization.",
  "10. Choose Costes iterations (minimum 10, better 100+ for statistical significance).",
  "11. Results GUI shows tables and images (Li plots, scatterplots, 2D histograms with regression).",
  "12. Scatterplot uses fire color LUT; log checkbox toggles log scaling display.",
  "13. Save results as standardized PDF format for consistent comparison.",
  "14. This tool may take a while to run, so you need to remind users to be patient.",
]
site = "https://imagej.net/plugins/coloc-2"

