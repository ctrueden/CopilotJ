# - Boundary & ringing:
#   - **Pad** the image (e.g., reflect/symmetric) before deconvolution to reduce ringing.
#   - Avoid very sharp/undersized PSFs that cause halos.
# - Iterations / strength:
#   - RL typically **10–50 iterations**; stop early if noise or halos appear.
#   - For Wiener, tune **NSR/K** (noise‑to‑signal) — higher values give smoother, less sharp results.
# - Noise handling:
