#   - For RL, consider light **post‑denoising** if grain increases.
# - Intensity constraints:
#   - Enforce **non‑negativity** and clip to valid ranges after each iteration.
# - Microscopy specifics:
#   - Use **Airy or measured PSF** for widefield; consider per‑channel PSFs for multicolor images.
#   - For **3D stacks**, use a **3D PSF**; deconvolve per‑slice with consistent parameters.
# - Motion/camera shake:
#   - Use a **linear or trajectory PSF** (length/angle from EXIF/gyroscope or visual estimate).
#   - Start with short kernels; increase length gradually to avoid artifacts.
# - Color strategy:
#   - Deconvolve **luminance** (grayscale) or **per‑channel** and then recombine; beware of color shifts.
# - Scale & sampling:
#   - Match PSF **pixel size/NA/wavelength** to acquisition; resample if needed to avoid mismatch.
# - Validation:
#   - Watch for **ringing/halos** around edges; compare edges and small features to raw data.
#   - Use a small **ROI pilot run** to tune parameters before batch processing.
# - Performance:
#   - Prefer **FFT‑based** convolution; crop/pyramid for very large images.
#   - Batch process with fixed params for reproducibility; record PSF and settings with outputs.
# - When PSF is unknown:
#   - Try a **range of plausible PSFs**; pick the one minimizing artifacts (sharper edges, no halos).
#   - If severe/complex blur, consider adding a separate **PSF estimation** step before this tool.
# """


