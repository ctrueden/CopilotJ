query = """
There are several images, I want to crop them and then, merge image channels
"""
correct_macro = [
  """
// Define input and output directories
String inputDir = "C:/XXXX/ExampleFly/images/";
String outputDir = inputDir + "cropped_merged/";
File.makeDirectory(outputDir);

// Open a sample image for the user to define the ROI
open(inputDir + "01_POS002_D.TIF");
waitForUser("Define Crop Area", "Please draw a rectangular ROI on the image and then click OK.");

// Get the selection bounds and close the sample image
getSelectionBounds(x, y, width, height);
close();

// Array of positions to process
String[] positions = { "002", "076", "218" };

// Loop through each position
for (int i = 0; i < positions.length; i++) {
    String pos = positions[i];

    // Open the three channels for the current position
    open(inputDir + "01_POS" + pos + "_D.TIF");
    open(inputDir + "01_POS" + pos + "_F.TIF");
    open(inputDir + "01_POS" + pos + "_R.TIF");

    // Apply the same ROI and crop each image
    selectWindow("01_POS" + pos + "_D.TIF");
    makeRectangle(x, y, width, height);
    run("Crop");

    selectWindow("01_POS" + pos + "_F.TIF");
    makeRectangle(x, y, width, height);
    run("Crop");

    selectWindow("01_POS" + pos + "_R.TIF");
    makeRectangle(x, y, width, height);
    run("Crop");

    // Merge the cropped channels
    run("Merge Channels...", "c1=01_POS" + pos + "_R.TIF c2=01_POS" + pos + "_F.TIF c3=01_POS" + pos + "_D.TIF create");

    // Save the merged image
    saveAs("Tiff", outputDir + "POS" + pos + "_merged.tif");

    // Close all windows to prepare for the next iteration
    run("Close All");
}

print("Batch processing complete.");
""",
]
correct_steps = [
  """
1. I will run a single, continuous script.
2. The script will first open a sample image.
3. ImageJ will then **pause and wait for you** to draw a rectangle over the area you want to crop.
