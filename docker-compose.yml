services:
  python:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatimagej-python:latest
    container_name: chatimagej-python
    volumes:
      - ./.env.local:/app/.env.local:ro
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: chatimagej-web:latest
    container_name: chatimagej-web
    depends_on:
      python:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: chatimagej-nginx
    depends_on:
      python:
        condition: service_started
      web:
        condition: service_started
    ports:
      - "8786:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
