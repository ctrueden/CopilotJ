# BiaPy Configuration for DermaMNIST Classification
# Dataset: DermaMNIST - 7-class dermatology classification
# Image size: 28x28x3 (RGB)
# Classes: 0=Actinic keratoses, 1=Basal cell carcinoma, 2=Benign keratosis-like lesions, 
#          3=Dermatofibroma, 4=Melanoma, 5=Melanocytic nevi, 6=Vascular lesions

SYSTEM:
    NUM_CPUS: -1

PROBLEM:
    TYPE: CLASSIFICATION
    NDIM: 2D

DATA: 
    PATCH_SIZE: (224, 224, 3)  # EfficientNet requires 224x224 input
    PREPROCESS:
        RESIZE:
            ENABLE: True
            OUTPUT_SHAPE: (224, 224)  # Resize 28x28 images to 224x224
            MODE: reflect
            ANTI_ALIASING: True
    TRAIN:                                                                                                              
        PATH: "C:/Users/10331/OneDrive/copilotj/biapy_pics/DermaMNIST/data/train"
        IN_MEMORY: True
    VAL:
        FROM_TRAIN: False
        PATH: "C:/Users/10331/OneDrive/copilotj/biapy_pics/DermaMNIST/data/validation"
        IN_MEMORY: True
    TEST:                                                                                                               
        IN_MEMORY: True
        LOAD_GT: True
        PATH: "C:/Users/10331/OneDrive/copilotj/biapy_pics/DermaMNIST/data/test"

AUGMENTOR:
    ENABLE: True
    RANDOM_ROT: True
    HFLIP: True
    VFLIP: True

MODEL:
    ARCHITECTURE: vit  # Vision Transformer for classification
    N_CLASSES: 7
    LOAD_CHECKPOINT: False

TRAIN:
    ENABLE: True
    OPTIMIZER: ADAMW
    LR: 1.E-4
    BATCH_SIZE: 32
    EPOCHS: 5  # Reduced for quicker training
    PATIENCE: 10

TEST:
    ENABLE: True